name: Automation Infrastructure Engine
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Web Delivery Page Infrastructure
        uses: actions/configure-pages@v5
      - name: Bundle Production Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy Live Link
        id: deployment
        uses: actions/deploy-pages@v4
